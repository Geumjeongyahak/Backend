services:
  app:
    image: ${APP_IMAGE:-ghcr.io/geumjeongyahak/backend:latest}
    build:
      context: .
      dockerfile: infra/app/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      MANAGEMENT_PORT: ${MANAGEMENT_PORT:-9090}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${MANAGEMENT_PORT:-9090}:9090"
    volumes:
      - "${APP_LOG_DIR:-./logs/app}:/app/logs"

  db:
    image: docker.io/library/postgres:${POSTGRES_VERSION:-16-alpine}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
