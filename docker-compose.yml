services:
  app:
    image: ${APP_IMAGE:-ghcr.io/geumjeongyahak/backend:latest}
    build:
      context: .
      dockerfile: infra/app/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      MANAGEMENT_PORT: ${MANAGEMENT_PORT:-9090}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${MANAGEMENT_PORT:-9090}:9090"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/sql/init_scheme.sql:/docker-entrypoint-initdb.d/01-init_schema.sql:ro
      - ./src/main/resources/sql/init_data.sql:/docker-entrypoint-initdb.d/02-init_data.sql:ro

volumes:
  postgres-data:
