spring:
  application:
    name: geumjeongyahak
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  jpa:
    open-in-view: false
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID}
      credentials:
        encoded-key: ${GCP_ENCODED_CREDENTIALS}
server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: ${GOOGLE_REDIRECT_URI}
      frontend-redirect-uri: ${FRONTEND_REDIRECT_URI}
  jwt:
    secret: ${JWT_SECRET}
    jwe-secret: ${JWE_SECRET:${JWT_SECRET}}
    access-exp-seconds: ${JWT_ACCESS_EXP_SECONDS:1800}
    oauth2-temp-exp-seconds: ${JWT_OAUTH2_TEMP_EXP_SECONDS:300}
    refresh-exp-seconds: ${JWT_REFRESH_EXP_SECONDS:1209600}
  file:
    image:
      max-size: 10MB
      allowed-mime-types:
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
    document:
      max-size: 30MB
      allowed-mime-types:
        - application/pdf
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - text/plain
        - application/vnd.ms-powerpoint
        - application/vnd.openxmlformats-officedocument.presentationml.presentation
