spring:
  application:
    name: geumjeongyahak
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  jpa:
    open-in-view: false
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:false}
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID}
      credentials:
        encoded-key: ${GCP_ENCODED_CREDENTIALS}
server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  mail:
    enabled: ${MAIL_ENABLED:false}
    fallback-to-log: ${MAIL_FALLBACK_TO_LOG:true}
    from-email: ${MAIL_FROM_EMAIL:no-reply@geumjeongschool.com}
    from-name: ${MAIL_FROM_NAME:금정야학}
    frontend-base-url: ${FRONTEND_BASE_URL:https://geumjeongschool.com}
    password-reset-path: ${MAIL_PASSWORD_RESET_PATH:/auth/reset-password}
    password-reset-expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:15}
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: ${GOOGLE_REDIRECT_URI}
      frontend-redirect-uri: ${FRONTEND_REDIRECT_URI}
  jwt:
    secret: ${JWT_SECRET}
    jwe-secret: ${JWE_SECRET:${JWT_SECRET}}
    access-exp-seconds: ${JWT_ACCESS_EXP_SECONDS:1800}
    oauth2-temp-exp-seconds: ${JWT_OAUTH2_TEMP_EXP_SECONDS:300}
    refresh-exp-seconds: ${JWT_REFRESH_EXP_SECONDS:1209600}
  file:
    image:
      max-size: 10MB
      allowed-mime-types:
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
    document:
      max-size: 30MB
      allowed-mime-types:
        - application/pdf
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - text/plain
        - application/vnd.ms-powerpoint
        - application/vnd.openxmlformats-officedocument.presentationml.presentation
    cleanup:
      retention-days: 7
      chunk-size: 100
      cron: "0 0 3 * * *"
  post:
    draft-expiration-minutes: 60
  bootstrap:
    admin:
      enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      name: ${ADMIN_NAME:관리자}
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    project-id: ${FIREBASE_PROJECT_ID:}
    credentials-base64: ${FIREBASE_CREDENTIALS_BASE64:}
    web-api-key: ${FIREBASE_WEB_API_KEY:}
    web-auth-domain: ${FIREBASE_WEB_AUTH_DOMAIN:}
    web-project-id: ${FIREBASE_WEB_PROJECT_ID:${FIREBASE_PROJECT_ID:}}
    web-storage-bucket: ${FIREBASE_WEB_STORAGE_BUCKET:}
    web-messaging-sender-id: ${FIREBASE_WEB_MESSAGING_SENDER_ID:}
    web-app-id: ${FIREBASE_WEB_APP_ID:}
    web-vapid-key: ${FIREBASE_WEB_VAPID_KEY:}
