<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>OAuth2 Redirect</title>
  <style>
    body { font-family: sans-serif; margin: 24px; }
    code, pre { display: block; padding: 12px; background: #f6f8fa; border-radius: 8px; overflow-x: auto; }
    button { padding: 10px 14px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; }
  </style>
</head>
<body>
<h2>OAuth2 로그인 성공</h2>

<h3>access_token</h3>
<pre id="token">(파싱 중...)</pre>
<button id="copyBtn">토큰 복사</button>

<h3>다음 단계</h3>
<ol>
  <li><a href="/swagger-ui/index.html" target="_blank">Swagger UI 열기</a></li>
  <li>Authorize → <code>&lt;token&gt;</code> 입력</li>
</ol>

<script>
  function parseHash() {
    const hash = window.location.hash || "";
    const params = new URLSearchParams(hash.replace(/^#/, ""));
    return params.get("access_token");
  }

  const token = parseHash();
  const tokenEl = document.getElementById("token");
  const copyBtn = document.getElementById("copyBtn");

  if (!token) {
    tokenEl.textContent = "access_token이 없습니다. (token-transport=fragment 설정 확인)";
    copyBtn.disabled = true;
  } else {
    tokenEl.textContent = token;
    copyBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(token);
        copyBtn.textContent = "복사 완료!";
        setTimeout(() => copyBtn.textContent = "토큰 복사", 1000);
      } catch (e) {
        alert("복사 실패: 브라우저 권한을 확인해주세요.");
      }
    });
  }
</script>
</body>
</html>
