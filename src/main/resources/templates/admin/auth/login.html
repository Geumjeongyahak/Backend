<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#89ca6b">
    <title>관리자 로그인 | 금정열린배움터</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/icons/geumjeongyahak-icon.svg}">
    <link rel="apple-touch-icon" th:href="@{/icons/apple-touch-icon.png}">
    <link rel="manifest" th:href="@{/site.webmanifest}">
    <style>
        :root {
            --page: #f4f6f4;
            --panel: #ffffff;
            --ink: #151a18;
            --muted: #777f7a;
            --line: #dfe5df;
            --green: #89ca6b;
            --green-dark: #4f9d34;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--page);
            color: var(--ink);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .login {
            width: min(430px, calc(100vw - 32px));
            padding: 30px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 26px;
        }
        .mark {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: contain;
        }
        h1 { margin: 0; font-size: 24px; }
        p { margin: 5px 0 0; color: var(--muted); font-size: 14px; }
        label {
            display: block;
            margin: 16px 0 7px;
            color: #4b554f;
            font-size: 13px;
            font-weight: 800;
        }
        input {
            width: 100%;
            height: 48px;
            padding: 0 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 15px;
        }
        input:focus {
            outline: 2px solid rgba(137, 202, 107, .26);
            border-color: var(--green-dark);
        }
        button {
            width: 100%;
            height: 48px;
            margin-top: 22px;
            border: 0;
            border-radius: 8px;
            background: var(--green);
            color: #fff;
            font-weight: 900;
            cursor: pointer;
        }
        .message {
            margin-top: 14px;
            padding: 11px 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .error { background: #fff0ed; color: #b0392b; }
        .success { background: #edf9e8; color: var(--green-dark); }
    </style>
</head>
<body>
<main class="login">
    <div class="brand">
        <img class="mark" th:src="@{/icons/geumjeongyahak-icon.svg}" alt="금정열린배움터">
        <div>
            <h1>관리자 로그인</h1>
            <p>사용자, 부서, 분반, 구매 요청 관리</p>
        </div>
    </div>
    <form th:action="@{/admin/auth/login}" method="post">
        <label for="username">이메일</label>
        <input id="username" name="username" type="email" autocomplete="username" required>

        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">로그인</button>
    </form>
    <div class="message error" th:if="${param.error}">로그인 정보 또는 관리자 권한을 확인해주세요.</div>
    <div class="message error" th:if="${param.denied}">관리자 페이지 접근 권한이 없습니다.</div>
    <div class="message success" th:if="${param.logout}">로그아웃되었습니다.</div>
</main>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
}
</script>
</body>
</html>
