<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('연혁 등록')}"></head>
<body>
<div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
    <main class="stack">
        <div class="page-title"><div><h1>연혁 등록</h1><p>연혁 항목과 링크, 사진 URL을 등록합니다.</p></div></div>
        <form class="panel form-grid" th:action="@{/admin/site-content/history}" method="post" enctype="multipart/form-data">
            <label>제목 <input name="title" required maxlength="120"></label>
            <label>날짜 <input type="date" name="historyDate" required></label>
            <label>정렬 <input type="number" name="sortOrder" value="0"></label>
            <label style="grid-column: 1 / -1;">상세 <textarea name="detail" rows="4"></textarea></label>
            <label style="grid-column: 1 / -1;">링크
                <textarea name="linksText" rows="4" placeholder="한 줄에 label|href 형식으로 입력"></textarea>
            </label>
            <label style="grid-column: 1 / -1;">사진
                <textarea name="photosText" rows="5" placeholder="한 줄에 src|alt 또는 fileId|src|alt 형식으로 입력"></textarea>
            </label>
            <label>사진 업로드 <input type="file" name="photoFile" accept="image/*"></label>
            <label>업로드 사진 설명 <input name="photoAlt" maxlength="255"></label>
            <button class="button" type="submit">등록</button>
            <a class="reset-link" th:href="@{/admin/site-content/history}">취소</a>
        </form>
    </main>
</div>
</body>
</html>
