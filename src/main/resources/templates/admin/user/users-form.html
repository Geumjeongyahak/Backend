<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('사용자 등록')}"></head>
<body><div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
<main class="stack">
    <div class="page-title"><div><h1>사용자 등록</h1><p>새 관리자/봉사자 계정을 생성합니다.</p></div></div>
    <form class="panel form-grid" th:action="@{/admin/user/users}" method="post">
        <label>이메일 <input name="email" type="email" required></label>
        <label>이름 <input name="name" required></label>
        <label>비밀번호 <input name="password" type="password" minlength="8" required></label>
        <label>연락처 <input name="phoneNumber"></label>
        <label>역할
            <select name="role">
                <option value="VOLUNTEER">VOLUNTEER</option>
                <option value="MANAGER">MANAGER</option>
                <option value="ADMIN">ADMIN</option>
                <option value="GUEST">GUEST</option>
            </select>
        </label>
        <label>부서
            <select name="departmentId">
                <option value="">없음</option>
                <option th:each="department : ${departments}" th:value="${department.id}" th:text="${department.name}">부서</option>
            </select>
        </label>
        <label>분반
            <select name="classroomId">
                <option value="">없음</option>
                <option th:each="classroom : ${classrooms}" th:value="${classroom.id}" th:text="${classroom.name}">분반</option>
            </select>
        </label>
        <button class="button" type="submit">등록</button>
    </form>
</main>
</div></body></html>
