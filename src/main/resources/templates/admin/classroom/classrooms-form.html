<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('분반 등록')}"></head>
<body><div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
<main class="stack"><div class="page-title"><div><h1>분반 등록</h1><p>교육 운영 분반을 생성합니다.</p></div></div>
<form class="panel form-grid" th:action="@{/admin/classroom/classrooms}" method="post"><label>분반명 <input name="name" required></label><label>유형 <select name="type"><option th:each="type : ${classroomTypes}" th:value="${type.name()}" th:text="${type.name()}">WEEKDAY</option></select></label><label>설명 <textarea name="description"></textarea></label><button class="button" type="submit">등록</button></form>
</main></div></body></html>
