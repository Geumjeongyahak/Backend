<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('교학 회의록 수정')}"></head>
<body>
<div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
    <main class="stack">
        <div class="page-title">
            <div>
                <h1>교학 회의록 수정</h1>
                <p>회의 후 논의 사항과 건의/제안 사항을 추가하고 상태를 전환할 수 있습니다.</p>
            </div>
        </div>

        <form class="panel form-grid" th:action="@{/admin/meeting-records/{recordId}(recordId=${record.id})}" th:object="${form}" method="post">
            <label>상태
                <select th:field="*{status}">
                    <option th:each="status : ${statuses}" th:value="${status.name()}" th:text="${status.name()}">BEFORE_MEETING</option>
                </select>
            </label>
            <label>제목 <input th:field="*{title}" required></label>
            <label>안건 <textarea th:field="*{agenda}" required></textarea></label>
            <label>논의 사항 <textarea th:field="*{discussion}" placeholder="회의 후 논의 사항을 입력하세요."></textarea></label>
            <label>건의/제안 사항 <textarea th:field="*{suggestion}" placeholder="회의 후 건의/제안 사항을 입력하세요."></textarea></label>
            <button class="button" type="submit">저장</button>
        </form>
    </main>
</div>
</body>
</html>
