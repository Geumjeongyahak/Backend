<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('교학 회의록 상세')}"></head>
<body>
<div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
    <main class="stack">
        <div class="page-title">
            <div>
                <h1 th:text="${record.title}">교학 회의록</h1>
                <p>회의록 상세와 불참 사유서를 확인합니다.</p>
            </div>
            <div class="inline-form">
                <a class="button" th:href="@{/admin/meeting-records/{recordId}/edit(recordId=${record.id})}">수정</a>
                <form class="inline-form" th:action="@{/admin/meeting-records/{recordId}/delete(recordId=${record.id})}" method="post" onsubmit="return confirm('이 교학 회의록을 삭제하시겠습니까?');">
                    <button class="button danger" type="submit">삭제</button>
                </form>
            </div>
        </div>

        <section class="panel detail-grid">
            <div class="detail-item"><span>상태</span><strong th:text="${record.status.name()}">BEFORE_MEETING</strong></div>
            <div class="detail-item"><span>작성자</span><strong><a class="link" th:href="@{/admin/user/users/{userId}(userId=${record.authorId})}" th:text="${record.author}">작성자</a></strong></div>
            <div class="detail-item"><span>작성일</span><strong th:text="${#temporals.format(record.createdAt, 'yyyy.MM.dd HH:mm')}">2026.01.01</strong></div>
            <div class="detail-item"><span>조회수</span><strong th:text="${record.viewCount}">0</strong></div>
        </section>

        <section class="panel stack">
            <div>
                <h2>안건</h2>
                <p style="white-space: pre-wrap;" th:text="${record.agenda}">안건</p>
            </div>
            <div>
                <h2>논의 사항</h2>
                <p style="white-space: pre-wrap;" th:text="${record.discussion ?: '-'}">-</p>
            </div>
            <div>
                <h2>건의/제안 사항</h2>
                <p style="white-space: pre-wrap;" th:text="${record.suggestion ?: '-'}">-</p>
            </div>
        </section>

        <section class="panel table-panel">
            <h2>불참 사유서</h2>
            <div class="table-scroll">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>작성자</th>
                        <th>불참 사유</th>
                        <th>의견</th>
                        <th>작성일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="report : ${record.absenceReports}">
                        <td th:text="${report.id}">1</td>
                        <td th:text="${report.author}">김철수</td>
                        <td th:text="${report.reason}">사유</td>
                        <td th:text="${report.opinion ?: '-'}">의견</td>
                        <td th:text="${#temporals.format(report.createdAt, 'yyyy.MM.dd HH:mm')}">2026.01.01</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(record.absenceReports)}">
                        <td colspan="5" class="empty">불참 사유서가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
