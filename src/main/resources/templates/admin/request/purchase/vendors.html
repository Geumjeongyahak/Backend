<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('거래처 관리')}"></head>
<body>
<div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
    <main class="stack">
        <div class="page-title">
            <div>
                <h1>거래처</h1>
                <p>선결제 거래처와 잔액을 관리합니다.</p>
            </div>
            <a class="button" th:href="@{/admin/request/purchase/vendors/new}">거래처 등록</a>
        </div>

        <form class="panel vendor-filter" th:action="@{/admin/request/purchase/vendors}" method="get">
            <label>검색어
                <input name="keyword" th:value="${keyword}" placeholder="거래처명">
            </label>
            <label>정렬
                <select name="sort">
                    <option value="name,ASC" th:selected="${sort == null || sort == 'name,ASC'}">거래처명 오름차순</option>
                    <option value="name,DESC" th:selected="${sort == 'name,DESC'}">거래처명 내림차순</option>
                    <option value="balance,DESC" th:selected="${sort == 'balance,DESC'}">잔액 높은순</option>
                    <option value="balance,ASC" th:selected="${sort == 'balance,ASC'}">잔액 낮은순</option>
                    <option value="createdAt,DESC" th:selected="${sort == 'createdAt,DESC'}">생성일 최신순</option>
                    <option value="createdAt,ASC" th:selected="${sort == 'createdAt,ASC'}">생성일 오래된순</option>
                </select>
            </label>
            <label class="check-label vendor-active-filter">
                <input type="checkbox" name="activeOnly" value="true" th:checked="${activeOnly}">
                활성 거래처만
            </label>
            <button class="button" type="submit">조회</button>
            <a class="reset-link" th:href="@{/admin/request/purchase/vendors}">초기화</a>
        </form>

        <section class="panel table-panel">
            <div class="table-scroll">
                <table class="vendor-table">
                    <colgroup>
                        <col style="width: 46px;">
                        <col style="width: 130px;">
                        <col>
                        <col style="width: 90px;">
                        <col style="width: 70px;">
                    </colgroup>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>거래처</th>
                        <th>설명</th>
                        <th>잔액</th>
                        <th>상태</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="vendor : ${vendors}">
                        <td th:text="${vendor.id}">1</td>
                        <td><a class="link" th:href="@{/admin/request/purchase/vendors/{vendorId}(vendorId=${vendor.id})}" th:text="${vendor.name}">거래처</a></td>
                        <td th:text="${vendor.description ?: '-'}">-</td>
                        <td class="money" th:text="${#numbers.formatInteger(vendor.balance, 0, 'COMMA')}">0</td>
                        <td><span class="pill" th:classappend="${vendor.isActive} ? 'status-APPROVED' : 'status-REJECTED'" th:text="${vendor.isActive ? '활성' : '비활성'}">활성</span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(vendors)}">
                        <td colspan="5" class="empty">거래처가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
        <style>
            .vendor-filter {
                display: grid;
                grid-template-columns: minmax(220px, 1.4fr) minmax(190px, 1fr) auto auto auto;
                gap: 10px;
                align-items: end;
            }
            .vendor-active-filter {
                min-height: 40px;
                padding: 0 4px;
            }
            .vendor-table {
                min-width: 0;
                table-layout: fixed;
            }
            .vendor-table th,
            .vendor-table td {
                padding: 12px 10px;
                vertical-align: middle;
            }
            .vendor-table td:nth-child(3) {
                color: #4f5953;
                overflow-wrap: anywhere;
            }
            .money {
                text-align: right;
                font-variant-numeric: tabular-nums;
                font-weight: 900;
            }
            @media (max-width: 680px) {
                .vendor-filter {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </main>
</div>
</body>
</html>
