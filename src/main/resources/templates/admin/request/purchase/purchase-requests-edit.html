<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('구매 요청 수정')}"></head>
<body><div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
<main class="stack">
    <div class="page-title">
        <div><h1>구매 요청 수정</h1><p>기자재 구매 요청 내용을 수정합니다.</p></div>
        <form class="inline-form" th:if="${request.status.name() == 'PENDING'}" th:action="@{/admin/request/purchase/purchase-requests/{requestId}/delete(requestId=${request.id})}" method="post" onsubmit="return confirm('이 구매 요청을 삭제하시겠습니까?');">
            <button class="button danger" type="submit">삭제</button>
        </form>
    </div>

    <div class="panel" style="background: #f8faf9; border-left: 4px solid var(--green); margin-bottom: 24px;" th:if="${request.status.name() == 'APPROVED'}">
        <h3 style="margin-top: 0;">구매 결과 보고 단계</h3>
        <p style="margin-bottom: 0; color: #566059; font-size: 14px; line-height: 1.6;">
            관리자가 요청을 승인했습니다. 필요하면 품목별 <strong>영수증 사진</strong>을 교체해 주세요.<br>
            보고가 완료되면 관리자의 최종 확인 후 프로세스가 종료됩니다.
        </p>
    </div>
    <div class="panel" style="background: #f8faf9; border-left: 4px solid var(--green); margin-bottom: 24px;" th:if="${request.status.name() == 'PURCHASED'}">
        <h3 style="margin-top: 0;">결재 확인 대기 단계</h3>
        <p style="margin-bottom: 0; color: #566059; font-size: 14px; line-height: 1.6;">
            구매 완료 보고가 제출되었습니다. 상세 화면에서 영수증과 금액을 확인한 뒤 결재 확인을 완료할 수 있습니다.
        </p>
    </div>

    <form id="purchase-form" class="panel form-grid" th:action="${request.status.name() == 'APPROVED'} ? @{/admin/request/purchase/purchase-requests/{requestId}/report(requestId=${request.id})} : @{/admin/request/purchase/purchase-requests/{requestId}(requestId=${request.id})}" th:object="${form}" method="post">
        <label>분반
            <input type="text" th:value="${request.classroomName}" readonly disabled>
        </label>
        <label>제목 <input th:field="*{title}" th:readonly="${request.status.name() != 'PENDING'}" required></label>
        <label>내용 <textarea th:field="*{content}" th:readonly="${request.status.name() != 'PENDING'}" required></textarea></label>
        <label>결제 방식
            <select th:field="*{paymentMethod}" th:disabled="${request.status.name() != 'PENDING'}">
                <option value="NORMAL">일반 결제</option>
                <option value="VENDOR_PREPAID">거래처 선결제</option>
            </select>
        </label>
        <label>거래처
            <select th:field="*{vendorId}" th:disabled="${request.status.name() != 'PENDING'}">
                <option value="">선택 안 함</option>
                <option th:each="vendor : ${vendors}" th:value="${vendor.id}" th:text="|${vendor.name} (${vendor.balance}원)|">거래처</option>
            </select>
        </label>
        
        <div class="stack" style="--gap: 1rem;">
            <h3>구매 항목</h3>
            <div id="items-container" class="stack" style="--gap: 0.5rem;">
                <div th:each="item, stat : *{items}" class="panel item-row" style="display: grid; grid-template-columns: minmax(150px, 1fr) minmax(180px, 1.2fr) minmax(120px, .8fr) minmax(220px, 1.1fr) auto; gap: 1rem; align-items: end;">
                    <input type="hidden" th:field="*{items[__${stat.index}__].id}">
                    <label>품명 <input th:field="*{items[__${stat.index}__].name}" th:readonly="${request.status.name() != 'PENDING'}" required></label>
                    <label>사유 <input th:field="*{items[__${stat.index}__].reason}" th:readonly="${request.status.name() != 'PENDING'}"></label>
                    
                    <label>결제 금액
                        <input type="number" th:field="*{items[__${stat.index}__].price}"
                               min="0"
                               th:readonly="${request.status.name() != 'PENDING'}"
                               placeholder="결제 금액">
                    </label>
                    <div class="receipt-field">
                        <span class="field-label">품목 영수증</span>
                        <input type="hidden" th:field="*{items[__${stat.index}__].receiptFileId}">
                        <div class="receipt-preview">
                            <a class="receipt-chip" th:if="${item.receiptFileUrl != null}" th:href="${item.receiptFileUrl}" target="_blank">보기</a>
                            <span class="receipt-empty" th:if="${item.receiptFileUrl == null}">미첨부</span>
                        </div>
                        <label class="file-button" th:if="${request.status.name() == 'PENDING' || request.status.name() == 'APPROVED'}">
                            <span>파일 선택</span>
                            <input type="file" accept="image/*" onchange="uploadItemReceipt(this)">
                        </label>
                    </div>
                    <button type="button" class="button danger" th:if="${stat.index > 0 && request.status.name() == 'PENDING'}" onclick="removeRow(this)">삭제</button>
                </div>
            </div>
            <button type="button" class="button secondary" onclick="addItemRow()" th:if="${request.status.name() == 'PENDING'}">항목 추가</button>
        </div>

        <div class="inline-form">
            <button class="button" type="submit" th:if="${request.status.name() != 'PURCHASED' && request.status.name() != 'CONFIRMED'}" th:text="${request.status.name() == 'APPROVED'} ? '구매 완료 보고' : '수정'">수정</button>
            <a class="button secondary" th:href="@{/admin/request/purchase/purchase-requests/{requestId}(requestId=${request.id})}">상세로</a>
        </div>
    </form>
    <script th:inline="javascript">
        let itemIndex = /*[[${form.items.size()}]]*/ 0;
        const isPending = /*[[${request.status.name() == 'PENDING'}]]*/ true;
        const isApproved = /*[[${request.status.name() == 'APPROVED'}]]*/ false;

        async function uploadItemReceipt(input) {
            const file = input.files && input.files[0];
            if (!file) return;

            const row = input.closest('.item-row');
            const hidden = row.querySelector('input[name*=".receiptFileId"]');
            const preview = row.querySelector('.receipt-preview');
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/admin/request/purchase/purchase-requests/receipt-images', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorBody = await response.text();
                    console.error('영수증 업로드 실패', response.status, errorBody);
                    throw new Error(`업로드 실패 (${response.status})`);
                }

                const data = await response.json();
                hidden.value = data.fileId;
                preview.innerHTML = `<a class="receipt-chip" href="${data.url}" target="_blank">보기</a>`;
            } catch (error) {
                console.error(error);
                alert(`이미지 업로드 중 오류가 발생했습니다. ${error.message}`);
            } finally {
                input.value = '';
            }
        }

        function addItemRow() {
            if (!isPending) return;
            const container = document.getElementById('items-container');
            const newRow = document.createElement('div');
            newRow.className = 'panel item-row';
            newRow.style.cssText = 'display: grid; grid-template-columns: minmax(150px, 1fr) minmax(180px, 1.2fr) minmax(120px, .8fr) minmax(220px, 1.1fr) auto; gap: 1rem; align-items: end;';
            newRow.innerHTML = `
                <label>품명 <input name="items[${itemIndex}].name" required></label>
                <label>사유 <input name="items[${itemIndex}].reason"></label>
                <label>결제 금액 <input type="number" name="items[${itemIndex}].price" min="0" required placeholder="결제 금액"></label>
                <div class="receipt-field">
                    <span class="field-label">품목 영수증</span>
                    <input type="hidden" name="items[${itemIndex}].receiptFileId">
                    <div class="receipt-preview"><span class="receipt-empty">미첨부</span></div>
                    <label class="file-button"><span>파일 선택</span><input type="file" accept="image/*" onchange="uploadItemReceipt(this)"></label>
                </div>
                <button type="button" class="button danger" onclick="removeRow(this)">삭제</button>
            `;
            container.appendChild(newRow);
            itemIndex++;
        }

        function removeRow(button) {
            if (!isPending) return;
            button.closest('.item-row').remove();
            reindexRows();
        }

        function reindexRows() {
            const rows = document.querySelectorAll('.item-row');
            rows.forEach((row, index) => {
                const idInput = row.querySelector('input[name*=".id"]');
                const nameInput = row.querySelector('input[name*=".name"]');
                const reasonInput = row.querySelector('input[name*=".reason"]');
                const priceInput = row.querySelector('input[name*=".price"]');
                const receiptInput = row.querySelector('input[name*=".receiptFileId"]');
                
                if (idInput) idInput.name = `items[${index}].id`;
                if (nameInput) nameInput.name = `items[${index}].name`;
                if (reasonInput) reasonInput.name = `items[${index}].reason`;
                if (priceInput) priceInput.name = `items[${index}].price`;
                if (receiptInput) receiptInput.name = `items[${index}].receiptFileId`;
            });
            itemIndex = rows.length;
        }
    </script>
    <style>
        .receipt-field {
            display: grid;
            gap: 6px;
            min-width: 0;
        }
        .field-label {
            color: #4b554f;
            font-size: 13px;
            font-weight: 800;
        }
        .receipt-preview {
            min-height: 32px;
            display: flex;
            align-items: center;
        }
        .receipt-chip {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--green-dark);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }
        .receipt-empty {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }
        .file-button {
            width: fit-content;
            min-height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: #4f5953;
            cursor: pointer;
            font-size: 13px;
            font-weight: 900;
        }
        .file-button input {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</main>
</div></body></html>
