<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('구매 요청 수정')}"></head>
<body><div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
<main class="stack">
    <div class="page-title">
        <div><h1>구매 요청 수정</h1><p>기자재 구매 요청 내용을 수정합니다.</p></div>
        <form class="inline-form" th:if="${request.status.name() == 'PENDING'}" th:action="@{/admin/request/purchase/purchase-requests/{requestId}/delete(requestId=${request.id})}" method="post" onsubmit="return confirm('이 구매 요청을 삭제하시겠습니까?');">
            <button class="button danger" type="submit">삭제</button>
        </form>
    </div>

    <div class="panel" style="background: #f8faf9; border-left: 4px solid var(--green); margin-bottom: 24px;" th:if="${request.status.name() == 'APPROVED'}">
        <h3 style="margin-top: 0;">구매 결과 보고 단계</h3>
        <p style="margin-bottom: 0; color: #566059; font-size: 14px; line-height: 1.6;">
            관리자가 요청을 승인했습니다. 물품 구매를 완료하셨다면 각 항목의 <strong>실제 구매 가격</strong>을 입력하고 <strong>영수증 사진</strong>을 업로드해 주세요.<br>
            보고가 완료되면 관리자의 최종 확인 후 프로세스가 종료됩니다.
        </p>
    </div>
    <div class="panel" style="background: #f8faf9; border-left: 4px solid var(--green); margin-bottom: 24px;" th:if="${request.status.name() == 'PURCHASED'}">
        <h3 style="margin-top: 0;">결재 확인 대기 단계</h3>
        <p style="margin-bottom: 0; color: #566059; font-size: 14px; line-height: 1.6;">
            구매 완료 보고가 제출되었습니다. 상세 화면에서 영수증과 금액을 확인한 뒤 결재 확인을 완료할 수 있습니다.
        </p>
    </div>

    <form id="purchase-form" class="panel form-grid" th:action="${request.status.name() == 'APPROVED'} ? @{/admin/request/purchase/purchase-requests/{requestId}/report(requestId=${request.id})} : @{/admin/request/purchase/purchase-requests/{requestId}(requestId=${request.id})}" th:object="${form}" method="post">
        <label>분반
            <input type="text" th:value="${request.classroomName}" readonly disabled>
        </label>
        <label>제목 <input th:field="*{title}" th:readonly="${request.status.name() != 'PENDING'}" required></label>
        <label>내용 <textarea th:field="*{content}" th:readonly="${request.status.name() != 'PENDING'}" required></textarea></label>
        <label>선금 요청 금액
            <input type="number" th:field="*{advancePaymentRequestedAmount}" min="0" th:readonly="${request.status.name() != 'PENDING'}">
        </label>
        <label th:if="${request.status.name() != 'PENDING'}">선금 승인 금액
            <input type="number" th:field="*{advancePaymentApprovedAmount}" readonly>
        </label>
        
        <div class="stack" style="--gap: 1rem;">
            <h3>구매 항목</h3>
            <div id="items-container" class="stack" style="--gap: 0.5rem;">
                <div th:each="item, stat : *{items}" class="panel item-row" style="display: grid; grid-template-columns: 1fr 1.4fr 1fr 1fr auto; gap: 1rem; align-items: end;">
                    <input type="hidden" th:field="*{items[__${stat.index}__].id}">
                    <label>품명 <input th:field="*{items[__${stat.index}__].name}" th:readonly="${request.status.name() != 'PENDING'}" required></label>
                    <label>사유 <input th:field="*{items[__${stat.index}__].reason}" th:readonly="${request.status.name() != 'PENDING'}"></label>
                    
                    <label>예상 가격
                        <input type="number" th:field="*{items[__${stat.index}__].expectedPrice}"
                               min="0"
                               th:readonly="${request.status.name() != 'PENDING'}"
                               placeholder="예상 가격">
                    </label>
                    <label>실제 가격
                        <input type="number" th:field="*{items[__${stat.index}__].actualPrice}"
                               min="0"
                               th:disabled="${request.status.name() != 'APPROVED'}"
                               th:placeholder="${request.status.name() == 'APPROVED'} ? '가격 입력' : '구매 후 입력'">
                    </label>
                    <button type="button" class="button danger" th:if="${stat.index > 0 && request.status.name() == 'PENDING'}" onclick="removeRow(this)">삭제</button>
                </div>
            </div>
            <button type="button" class="button secondary" onclick="addItemRow()" th:if="${request.status.name() == 'PENDING'}">항목 추가</button>
        </div>

        <div class="stack" style="--gap: 0.75rem;" th:if="${request.status.name() == 'APPROVED' || request.status.name() == 'PURCHASED' || request.status.name() == 'CONFIRMED'}">
            <h3>영수증</h3>
            <div id="receipt-inputs">
                <input type="hidden" th:each="receiptFileId, stat : *{receiptFileIds}" th:name="'receiptFileIds[' + ${stat.index} + ']'" th:value="${receiptFileId}">
            </div>
            <div id="receipt-preview" class="inline-form">
                <a class="button secondary" th:each="receiptFileUrl, stat : *{receiptFileUrls}" th:href="${receiptFileUrl}" target="_blank" th:text="'영수증 ' + ${stat.count}">영수증</a>
            </div>
            <label th:if="${request.status.name() == 'APPROVED'}">영수증 추가
                <input type="file" accept="image/*" multiple onchange="uploadReceipts(this)">
            </label>
        </div>

        <div class="inline-form">
            <button class="button" type="submit" th:if="${request.status.name() != 'PURCHASED' && request.status.name() != 'CONFIRMED'}" th:text="${request.status.name() == 'APPROVED'} ? '구매 완료 보고' : '수정'">수정</button>
            <a class="button secondary" th:href="@{/admin/request/purchase/purchase-requests/{requestId}(requestId=${request.id})}">상세로</a>
        </div>
    </form>
    <script th:inline="javascript">
        let itemIndex = /*[[${form.items.size()}]]*/ 0;
        const isPending = /*[[${request.status.name() == 'PENDING'}]]*/ true;
        const isApproved = /*[[${request.status.name() == 'APPROVED'}]]*/ false;

        async function uploadReceipts(input) {
            const files = Array.from(input.files || []);
            if (files.length === 0) return;

            const inputContainer = document.getElementById('receipt-inputs');
            const previewContainer = document.getElementById('receipt-preview');

            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const response = await fetch('/admin/request/purchase/purchase-requests/receipt-images', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const errorBody = await response.text();
                        console.error('영수증 업로드 실패', response.status, errorBody);
                        throw new Error(`업로드 실패 (${response.status})`);
                    }

                    const data = await response.json();
                    const index = inputContainer.querySelectorAll('input').length;
                    const hidden = document.createElement('input');
                    hidden.type = 'hidden';
                    hidden.name = `receiptFileIds[${index}]`;
                    hidden.value = data.fileId;
                    inputContainer.appendChild(hidden);

                    const link = document.createElement('a');
                    link.href = data.url;
                    link.target = '_blank';
                    link.className = 'button secondary';
                    link.textContent = `영수증 ${index + 1}`;
                    previewContainer.appendChild(link);
                } catch (error) {
                    console.error(error);
                    alert(`이미지 업로드 중 오류가 발생했습니다. ${error.message}`);
                }
            }
            input.value = '';
        }

        function addItemRow() {
            if (!isPending) return;
            const container = document.getElementById('items-container');
            const newRow = document.createElement('div');
            newRow.className = 'panel item-row';
            newRow.style.cssText = 'display: grid; grid-template-columns: 1fr 1.4fr 1fr 1fr auto; gap: 1rem; align-items: end;';
            newRow.innerHTML = `
                <label>품명 <input name="items[${itemIndex}].name" required></label>
                <label>사유 <input name="items[${itemIndex}].reason"></label>
                <label>예상 가격 <input type="number" name="items[${itemIndex}].expectedPrice" min="0" placeholder="예상 가격"></label>
                <label>실제 가격 <input type="number" name="items[${itemIndex}].actualPrice" disabled placeholder="구매 후 입력"></label>
                <button type="button" class="button danger" onclick="removeRow(this)">삭제</button>
            `;
            container.appendChild(newRow);
            itemIndex++;
        }

        function removeRow(button) {
            if (!isPending) return;
            button.closest('.item-row').remove();
            reindexRows();
        }

        function reindexRows() {
            const rows = document.querySelectorAll('.item-row');
            rows.forEach((row, index) => {
                const idInput = row.querySelector('input[name*=".id"]');
                const nameInput = row.querySelector('input[name*=".name"]');
                const reasonInput = row.querySelector('input[name*=".reason"]');
                const expectedPriceInput = row.querySelector('input[name*=".expectedPrice"]');
                const actualPriceInput = row.querySelector('input[name*=".actualPrice"]');
                
                if (idInput) idInput.name = `items[${index}].id`;
                if (nameInput) nameInput.name = `items[${index}].name`;
                if (reasonInput) reasonInput.name = `items[${index}].reason`;
                if (expectedPriceInput) expectedPriceInput.name = `items[${index}].expectedPrice`;
                if (actualPriceInput) actualPriceInput.name = `items[${index}].actualPrice`;
            });
            itemIndex = rows.length;
        }
    </script>
</main>
</div></body></html>
