<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('구매 요청 수정')}"></head>
<body><div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
<main class="stack">
    <div class="page-title"><div><h1>구매 요청 수정</h1><p>기자재 구매 요청 내용을 수정합니다.</p></div></div>

    <div class="panel" style="background: #f8faf9; border-left: 4px solid var(--green); margin-bottom: 24px;" th:if="${request.status.name() == 'APPROVED'}">
        <h3 style="margin-top: 0;">구매 결과 보고 단계</h3>
        <p style="margin-bottom: 0; color: #566059; font-size: 14px; line-height: 1.6;">
            관리자가 요청을 승인했습니다. 물품 구매를 완료하셨다면 각 항목의 <strong>실제 구매 가격</strong>을 입력하고 <strong>영수증 사진</strong>을 업로드해 주세요.<br>
            보고가 완료되면 관리자의 최종 확인 후 프로세스가 종료됩니다.
        </p>
    </div>

    <form id="purchase-form" class="panel form-grid" th:action="${request.status.name() == 'APPROVED'} ? @{/admin/request/purchase/purchase-requests/{requestId}/report(requestId=${request.id})} : @{/admin/request/purchase/purchase-requests/{requestId}(requestId=${request.id})}" th:object="${form}" method="post">
        <label>분반
            <input type="text" th:value="${request.classroomName}" readonly disabled>
        </label>
        <label>제목 <input th:field="*{title}" th:readonly="${request.status.name() != 'PENDING'}" required></label>
        <label>내용 <textarea th:field="*{content}" th:readonly="${request.status.name() != 'PENDING'}" required></textarea></label>
        
        <div class="stack" style="--gap: 1rem;">
            <h3>구매 항목</h3>
            <div id="items-container" class="stack" style="--gap: 0.5rem;">
                <div th:each="item, stat : *{items}" class="panel item-row" style="display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr auto; gap: 1rem; align-items: end;">
                    <input type="hidden" th:field="*{items[__${stat.index}__].id}">
                    <label>품명 <input th:field="*{items[__${stat.index}__].name}" th:readonly="${request.status.name() != 'PENDING'}" required></label>
                    <label>사유 <input th:field="*{items[__${stat.index}__].reason}" th:readonly="${request.status.name() != 'PENDING'}"></label>
                    
                    <label>실제 가격
                        <input type="number" th:field="*{items[__${stat.index}__].price}" 
                               th:disabled="${request.status.name() != 'APPROVED'}"
                               th:placeholder="${request.status.name() == 'APPROVED'} ? '가격 입력' : '구매 후 입력'">
                    </label>
                    
                    <label>영수증
                        <div class="file-input-wrapper" style="position: relative;">
                            <input type="hidden" th:id="'receiptFileId-' + ${stat.index}" th:field="*{items[__${stat.index}__].receiptFileId}">
                            <input type="file" th:id="'file-' + ${stat.index}" style="display: none;" 
                                   accept="image/*" 
                                   th:onchange="'uploadReceipt(' + ${stat.index} + ', this)'"
                                   th:disabled="${request.status.name() != 'APPROVED'}">
                            
                            <button type="button" class="button secondary" style="width: 100%;" 
                                    th:onclick="'document.getElementById(\'file-' + ${stat.index} + '\').click()'"
                                    th:disabled="${request.status.name() != 'APPROVED'}"
                                    th:text="${#strings.isEmpty(item.receiptFileUrl)} ? '사진 첨부' : '변경하기'">사진 첨부</button>
                            
                            <div th:id="'preview-container-' + ${stat.index}" style="margin-top: 8px;" th:if="${!#strings.isEmpty(item.receiptFileUrl)}">
                                <a th:href="${item.receiptFileUrl}" target="_blank" class="link" style="font-size: 12px;">영수증 보기 ↗</a>
                            </div>
                        </div>
                    </label>

                    <button type="button" class="button danger" th:if="${stat.index > 0 && request.status.name() == 'PENDING'}" onclick="removeRow(this)">삭제</button>
                </div>
            </div>
            <button type="button" class="button secondary" onclick="addItemRow()" th:if="${request.status.name() == 'PENDING'}">항목 추가</button>
        </div>

        <button class="button" type="submit" th:text="${request.status.name() == 'APPROVED'} ? '구매 보고 완료' : '수정'">수정</button>
    </form>
    <script th:inline="javascript">
        let itemIndex = /*[[${form.items.size()}]]*/ 0;
        const isPending = /*[[${request.status.name() == 'PENDING'}]]*/ true;
        const isApproved = /*[[${request.status.name() == 'APPROVED'}]]*/ false;

        async function uploadReceipt(index, input) {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/v1/files/images/purchase-items', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('업로드 실패');

                const data = await response.json();
                document.getElementById(`receiptFileId-${index}`).value = data.fileId;
                
                // Preview link
                let container = document.getElementById(`preview-container-${index}`);
                if (!container) {
                    container = document.createElement('div');
                    container.id = `preview-container-${index}`;
                    container.style.marginTop = '8px';
                    input.parentNode.appendChild(container);
                }
                container.innerHTML = `<a href="${data.url}" target="_blank" class="link" style="font-size: 12px;">영수증 보기 ↗</a>`;
                
                alert('영수증이 업로드되었습니다.');
            } catch (error) {
                console.error(error);
                alert('이미지 업로드 중 오류가 발생했습니다.');
            }
        }

        function addItemRow() {
            if (!isPending) return;
            const container = document.getElementById('items-container');
            const newRow = document.createElement('div');
            newRow.className = 'panel item-row';
            newRow.style.cssText = 'display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr auto; gap: 1rem; align-items: end;';
            newRow.innerHTML = `
                <label>품명 <input name="items[${itemIndex}].name" required></label>
                <label>사유 <input name="items[${itemIndex}].reason"></label>
                <label>실제 가격 <input type="number" name="items[${itemIndex}].price" disabled placeholder="구매 후 입력"></label>
                <label>영수증 <button type="button" class="button secondary" style="width: 100%;" disabled>사진 첨부</button></label>
                <button type="button" class="button danger" onclick="removeRow(this)">삭제</button>
            `;
            container.appendChild(newRow);
            itemIndex++;
        }

        function removeRow(button) {
            if (!isPending) return;
            button.closest('.item-row').remove();
            reindexRows();
        }

        function reindexRows() {
            const rows = document.querySelectorAll('.item-row');
            rows.forEach((row, index) => {
                const idInput = row.querySelector('input[name*=".id"]');
                const nameInput = row.querySelector('input[name*=".name"]');
                const reasonInput = row.querySelector('input[name*=".reason"]');
                const priceInput = row.querySelector('input[name*=".price"]');
                const receiptIdInput = row.querySelector('input[name*=".receiptFileId"]');
                
                if (idInput) idInput.name = `items[${index}].id`;
                if (nameInput) nameInput.name = `items[${index}].name`;
                if (reasonInput) reasonInput.name = `items[${index}].reason`;
                if (priceInput) priceInput.name = `items[${index}].price`;
                if (receiptIdInput) {
                    receiptIdInput.name = `items[${index}].receiptFileId`;
                    receiptIdInput.id = `receiptFileId-${index}`;
                }
                
                const fileInput = row.querySelector('input[type="file"]');
                if (fileInput) {
                    fileInput.id = `file-${index}`;
                    fileInput.setAttribute('onchange', `uploadReceipt(${index}, this)`);
                }
                
                const fileBtn = row.querySelector('button.secondary');
                if (fileBtn) {
                    fileBtn.setAttribute('onclick', `document.getElementById('file-${index}').click()`);
                }
                
                const preview = row.querySelector('div[id^="preview-container-"]');
                if (preview) preview.id = `preview-container-${index}`;
            });
            itemIndex = rows.length;
        }
    </script>
</main>
</div></body></html>
