<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('거래처 등록')}"></head>
<body>
<div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
    <main class="stack">
        <div class="page-title">
            <div>
                <h1>거래처 등록</h1>
                <p>선결제 결제처를 등록합니다.</p>
            </div>
        </div>

        <form class="panel form-grid" th:action="@{/admin/request/purchase/vendors}" method="post">
            <label>거래처명
                <input name="name" required placeholder="예: 예소디자인">
            </label>
            <label>설명
                <textarea name="description" placeholder="예: 부산대 인근 거래처"></textarea>
            </label>
            <div class="inline-form">
                <button class="button" type="submit">등록</button>
                <a class="button secondary" th:href="@{/admin/request/purchase/vendors}">목록</a>
            </div>
        </form>
    </main>
</div>
</body>
</html>
