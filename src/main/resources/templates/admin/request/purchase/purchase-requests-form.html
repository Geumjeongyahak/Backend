<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('구매 요청 등록')}"></head>
<body><div th:replace="~{admin/fragments/layout :: shell(~{::main})}">
<main class="stack">
    <div class="page-title"><div><h1>구매 요청 등록</h1><p>새로운 기자재 구매 요청을 생성합니다.</p></div></div>
    
    <div class="panel" style="background: #f8faf9; border-left: 4px solid var(--green); margin-bottom: 24px;">
        <h3 style="margin-top: 0;">구매 프로세스 안내</h3>
        <ol style="margin-bottom: 0; padding-left: 20px; color: #566059; font-size: 14px; line-height: 1.6;">
            <li><strong>신청</strong>: 필요한 물품의 품명, 사유, 확정 결제금액과 결제 방식을 작성합니다.</li>
            <li><strong>승인</strong>: 관리자가 요청 내용을 검토하고 선결제 방식이면 거래처 잔액에서 차감합니다.</li>
            <li><strong>보고</strong>: 품목별 영수증은 선택으로 첨부하고 승인 이후에도 교체할 수 있습니다.</li>
            <li><strong>확정</strong>: 최종 확인이 완료되면 요청 프로세스가 종료됩니다.</li>
        </ol>
    </div>

    <form class="panel form-grid" th:action="@{/admin/request/purchase/purchase-requests}" th:object="${form}" method="post">
        <label>분반
            <select th:field="*{classroomId}" required>
                <option th:each="classroom : ${classrooms}" th:value="${classroom.id}" th:text="${classroom.name}">분반명</option>
            </select>
        </label>
        <label>제목 <input th:field="*{title}" required placeholder="예: 교재 구입"></label>
        <label>내용 <textarea th:field="*{content}" required placeholder="구매 요청 사유 및 상세 내용을 입력하세요."></textarea></label>
        <label>결제 방식
            <select th:field="*{paymentMethod}">
                <option value="NORMAL">일반 결제</option>
                <option value="VENDOR_PREPAID">거래처 선결제</option>
            </select>
        </label>
        <label>거래처
            <select th:field="*{vendorId}">
                <option value="">선택 안 함</option>
                <option th:each="vendor : ${vendors}" th:value="${vendor.id}" th:text="|${vendor.name} (${vendor.balance}원)|">거래처</option>
            </select>
        </label>
        
        <div class="stack" style="--gap: 1rem;">
            <h3>구매 항목</h3>
            <div id="items-container" class="stack" style="--gap: 0.5rem;">
                <div th:each="item, stat : *{items}" class="panel item-row" style="display: grid; grid-template-columns: 1fr 1.4fr 1fr 1.2fr auto; gap: 1rem; align-items: end;">
                    <label>품명 <input th:field="*{items[__${stat.index}__].name}" required></label>
                    <label>사유 <input th:field="*{items[__${stat.index}__].reason}"></label>
                    <label>결제 금액 <input type="number" th:field="*{items[__${stat.index}__].price}" min="0" required placeholder="예: 15000"></label>
                    <div class="stack" style="--gap: 0.35rem;">
                        <input type="hidden" th:field="*{items[__${stat.index}__].receiptFileId}">
                        <div class="receipt-preview"></div>
                        <label>영수증
                            <input type="file" accept="image/*" onchange="uploadItemReceipt(this)">
                        </label>
                    </div>
                    <button type="button" class="button danger" th:if="${stat.index > 0}" onclick="removeRow(this)">삭제</button>
                </div>
            </div>
            <button type="button" class="button secondary" onclick="addItemRow()">항목 추가</button>
        </div>

        <button class="button" type="submit">등록</button>
    </form>
    <script th:inline="javascript">
        let itemIndex = /*[[${form.items.size()}]]*/ 0;

        async function uploadItemReceipt(input) {
            const file = input.files && input.files[0];
            if (!file) return;

            const row = input.closest('.item-row');
            const hidden = row.querySelector('input[name*=".receiptFileId"]');
            const preview = row.querySelector('.receipt-preview');
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/admin/request/purchase/purchase-requests/receipt-images', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorBody = await response.text();
                    console.error('영수증 업로드 실패', response.status, errorBody);
                    throw new Error(`업로드 실패 (${response.status})`);
                }

                const data = await response.json();
                hidden.value = data.fileId;
                preview.innerHTML = `<a class="link" href="${data.url}" target="_blank">첨부됨</a>`;
            } catch (error) {
                console.error(error);
                alert(`이미지 업로드 중 오류가 발생했습니다. ${error.message}`);
            } finally {
                input.value = '';
            }
        }

        function addItemRow() {
            const container = document.getElementById('items-container');
            const newRow = document.createElement('div');
            newRow.className = 'panel item-row';
            newRow.style.cssText = 'display: grid; grid-template-columns: 1fr 1.4fr 1fr 1.2fr auto; gap: 1rem; align-items: end;';
            newRow.innerHTML = `
                <label>품명 <input name="items[${itemIndex}].name" required></label>
                <label>사유 <input name="items[${itemIndex}].reason"></label>
                <label>결제 금액 <input type="number" name="items[${itemIndex}].price" min="0" required placeholder="예: 15000"></label>
                <div class="stack" style="--gap: 0.35rem;">
                    <input type="hidden" name="items[${itemIndex}].receiptFileId">
                    <div class="receipt-preview"></div>
                    <label>영수증 <input type="file" accept="image/*" onchange="uploadItemReceipt(this)"></label>
                </div>
                <button type="button" class="button danger" onclick="removeRow(this)">삭제</button>
            `;
            container.appendChild(newRow);
            itemIndex++;
        }

        function removeRow(button) {
            button.closest('.item-row').remove();
            reindexRows();
        }

        function reindexRows() {
            const rows = document.querySelectorAll('.item-row');
            rows.forEach((row, index) => {
                const nameInput = row.querySelector('input[name*=".name"]');
                const reasonInput = row.querySelector('input[name*=".reason"]');
                const priceInput = row.querySelector('input[name*=".price"]');
                const receiptInput = row.querySelector('input[name*=".receiptFileId"]');
                if (nameInput) nameInput.name = `items[${index}].name`;
                if (reasonInput) reasonInput.name = `items[${index}].reason`;
                if (priceInput) priceInput.name = `items[${index}].price`;
                if (receiptInput) receiptInput.name = `items[${index}].receiptFileId`;
            });
            itemIndex = rows.length;
        }
    </script>
</main>
</div></body></html>
