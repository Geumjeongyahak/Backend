global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          project: homelab
          env: infra
          service: prometheus
          role: prometheus
          instance_name: prometheus
          domain: homelab

  - job_name: app-actuator
    metrics_path: /actuator/prometheus
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/gjlearn/dev/app-actuator.yml
          - /etc/prometheus/targets/gjlearn/prod/app-actuator.yml

  - job_name: node-exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/gjlearn/dev/node-exporter.yml
          - /etc/prometheus/targets/gjlearn/prod/node-exporter.yml

  - job_name: postgres-exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/gjlearn/dev/postgres-exporter.yml
          - /etc/prometheus/targets/gjlearn/prod/postgres-exporter.yml
