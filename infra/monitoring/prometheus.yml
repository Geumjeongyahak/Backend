global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gjlearn-api
    metrics_path: /actuator/prometheus
    static_configs:
      # Replace with App VM Tailscale IP (100.x.x.x) or MagicDNS hostname.
      - targets:
          - gjlearn-app.example.ts.net:8080

  - job_name: gjlearn-app-node
    static_configs:
      # Replace with App VM Tailscale IP (100.x.x.x) or MagicDNS hostname.
      - targets:
          - gjlearn-app.example.ts.net:9100

  - job_name: gjlearn-db-node
    static_configs:
      # Replace with DB VM Tailscale IP (100.x.x.x) or MagicDNS hostname.
      - targets:
          - gjlearn-db.example.ts.net:9100

  - job_name: gjlearn-postgres
    static_configs:
      # Replace with DB VM Tailscale IP (100.x.x.x) or MagicDNS hostname.
      - targets:
          - gjlearn-db.example.ts.net:9187
