global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sonmoum-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - 10.0.0.10:9090

  - job_name: sonmoum-node
    static_configs:
      # Replace 10.0.0.10 with the private IP of the GCE instance running the API.
      - targets:
          - 10.0.0.10:9100

  - job_name: sonmoum-containers
    static_configs:
      - targets:
          - 10.0.0.10:8081

  - job_name: sonmoum-postgres
    static_configs:
      - targets:
          - 10.0.0.10:9187

  - job_name: sonmoum-alloy
    static_configs:
      - targets:
          - 10.0.0.10:12345
