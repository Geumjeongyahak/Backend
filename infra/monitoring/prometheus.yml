global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sonmoum-api
    metrics_path: /actuator/prometheus
    static_configs:
      # Replace 10.0.0.10 with the VPN or reachable private IP of the app GCE instance.
      - targets:
          - 10.0.0.10:9090

  - job_name: sonmoum-app-node
    static_configs:
      # Replace 10.0.0.10 with the VPN or reachable private IP of the app GCE instance.
      - targets:
          - 10.0.0.10:9100

  - job_name: sonmoum-db-node
    static_configs:
      # Replace 10.0.0.20 with the VPN or reachable private IP of the DB GCE instance.
      - targets:
          - 10.0.0.20:9100
