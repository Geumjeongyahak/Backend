name: Deploy to Dev (SSH)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Spring Boot jar
        run: ./gradlew bootJar -x test

      - name: Deploy jar over SSH
        env:
          SSH_HOST: ${{ secrets.DEV_GCE_HOST || secrets.GCE_HOST }}
          SSH_USER: ${{ secrets.DEV_GCE_USER || secrets.GCE_USER }}
          SSH_KEY: ${{ secrets.DEV_GCE_SSH_KEY || secrets.GCE_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${SSH_HOST}"
          test -n "${SSH_USER}"
          test -n "${SSH_KEY}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "${SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" "mkdir -p ~/app-dev"
          scp -i ~/.ssh/deploy_key build/libs/*.jar scripts/gcp/05_app/01_install-app-service.sh \
            "${SSH_USER}@${SSH_HOST}:~/app-dev/"
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" \
            "cd ~/app-dev && test -f .env && mv *.jar app.jar && chmod +x 01_install-app-service.sh && ./01_install-app-service.sh"
